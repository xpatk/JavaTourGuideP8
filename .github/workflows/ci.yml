name: Tourguide CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: TourGuide

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install local libraries
        run: |
          mvn install:install-file \
            -Dfile=libs/gpsUtil.jar \
            -DgroupId=gpsUtil \
            -DartifactId=gpsUtil \
            -Dversion=1.0.0 \
            -Dpackaging=jar

          mvn install:install-file \
            -Dfile=libs/TripPricer.jar \
            -DgroupId=tripPricer \
            -DartifactId=tripPricer \
            -Dversion=1.0.0 \
            -Dpackaging=jar

          mvn install:install-file \
            -Dfile=libs/RewardCentral.jar \
            -DgroupId=rewardCentral \
            -DartifactId=rewardCentral \
            -Dversion=1.0.0 \
            -Dpackaging=jar

      - name: Compile project
        run: mvn clean compile

      - name: Run unit tests
        run: mvn test

      - name: Package application
        run: mvn package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tourguide-jar
          path: TourGuide/target/*.jar